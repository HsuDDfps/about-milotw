    <style>

        h1 {

        }

        .job-titles {
            font-size: 0.85rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
        }

        .job-titles strong {
            font-weight: 700;
            color: #c5a3a3;
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(197, 163, 163, 0.7);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .list-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .interactive-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            height: 54px;
            width: 100%;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .item-content {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .interactive-item i {
            font-size: 1.2rem;
            min-width: 30px;
            text-align: center;
        }

        .item-text {
            font-size: 0.95rem;
            font-weight: 500;
            max-width: 0;
            opacity: 0;
            white-space: nowrap;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            margin-left: 0;
        }

        .interactive-item:hover {
            background: rgba(197, 163, 163, 0.12);
            border-color: rgba(197, 163, 163, 0.3);
        }

        .interactive-item:hover .item-text {
            max-width: 250px;
            opacity: 1;
            margin-left: 12px;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(197, 163, 163, 0.95);
            color: #0b0a0a;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 1000;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
        }
    </style>
</head>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        let toastTimeout;

        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`Copied ${label}: ${text}`);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimeout);
            
            toast.innerText = message;
            toast.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }
    </script>
