<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiloTW 米鹿</title>
    <link rel="icon" href="https://cdn.hsuddfps.com/uploads/1485558262266069023_MiloPFP_M.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'PingFang TC', -apple-system, sans-serif;
            background-color: #0b0a0a;
            color: #ffffff;
            min-height: 100vh; /* 改為最小高度 */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 頂部對齊以利捲動 */
            overflow-x: hidden;
            overflow-y: auto; /* 允許垂直捲動 */
            -webkit-overflow-scrolling: touch; /* 優化 iOS 捲動流暢度 */
        }

        /* 背景處理 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://cdn.hsuddfps.com/uploads/1487008462633177108_VZG_BG.png') no-repeat center center;
            background-size: cover;
            filter: blur(15px) brightness(0.35) sepia(0.2);
            transform: scale(1.1);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 40px 20px; /* 增加上下間距 */
            text-align: center;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 撐開容器 */
        }

        /* 個人資訊 */
        .profile-header {
            margin-bottom: 30px;
        }

        .pfp-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            position: relative;
        }

        .pfp-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(188, 143, 143, 0.4);
            object-fit: cover;
        }

        .pfp-container::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 1px solid rgba(188, 143, 143, 0.2);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        /* 名字動畫 */
        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
            color: #c5a3a3;
            text-shadow: 0 0 15px rgba(197, 163, 163, 0.3);
            animation: dustyGlow 4s ease-in-out infinite alternate;
        }

        @keyframes dustyGlow {
            from { text-shadow: 0 0 10px rgba(197, 163, 163, 0.2); opacity: 0.85; }
            to { text-shadow: 0 0 25px rgba(197, 163, 163, 0.6), 0 0 10px rgba(197, 163, 163, 0.4); opacity: 1; }
        }

        /* 職位介紹 */
        .job-titles {
            font-size: 0.85rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
        }

        .job-titles strong {
            font-weight: 700;
            color: #c5a3a3;
            margin-right: 4px;
        }

        .job-titles span {
            color: rgba(255, 255, 255, 0.2);
            margin: 0 4px;
        }

        /* 遊戲標籤 - 行動裝置優化 */
        .game-status {
            display: flex;
            flex-wrap: wrap; /* 允許在極小螢幕自動換行避免溢出 */
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            width: 100%;
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            user-select: none;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.5);
        }

        .status-tag:hover {
            background: rgba(197, 163, 163, 0.1);
            border-color: rgba(197, 163, 163, 0.3);
            color: #c5a3a3;
        }

        .valorant-tag.active {
            color: #ff4655;
            background: rgba(255, 70, 85, 0.05);
            border-color: rgba(255, 70, 85, 0.3);
        }

        /* 連結列表 */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1; /* 佔據剩餘空間 */
        }

        .link-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 15px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .link-item i {
            font-size: 1.1rem;
            width: 30px;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            color: #ffffff;
            opacity: 0.9;
        }

        .link-item:hover {
            background: rgba(197, 163, 163, 0.08);
            border-color: rgba(197, 163, 163, 0.2);
            transform: translateY(-2px);
            color: #ffffff;
        }

        /* Footer 修正為跟隨捲動並置中 */
        footer {
            margin-top: 50px; /* 與內容保持間距 */
            padding-bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <div class="profile-header">
            <div class="pfp-container">
                <img src="https://cdn.hsuddfps.com/uploads/1485558262266069023_MiloPFP_M.jpg" alt="MiloTW">
            </div>
            <h1>MiloTW 米鹿</h1>
            
            <div class="job-titles">
                <div><strong>Team Manager</strong><span>@</span>Velocity Zero</div>
                <div><strong>Graphic Designer</strong><span>@</span>WeiEnTWNews</div>
                <div><strong>Founder</strong><span>@</span>Pulse Studio</div>
            </div>

            <div class="game-status">
                <div class="status-tag valorant-tag" id="valTag" onclick="toggleSensi()">VALORANT</div>
                <div class="status-tag">PUBG: BATTLEGROUNDS</div>
                <div class="status-tag">Euro Truck Simulator 2</div>
            </div>
        </div>

        <div class="link-list">
            <a href="https://www.youtube.com/@HsuDDfps" class="link-item" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://www.twitch.tv/hsudd_fps" class="link-item" target="_blank">
                <i class="fab fa-twitch"></i> Twitch
            </a>
            <a href="https://x.com/HsuDDfps" class="link-item" target="_blank">
                <i class="fab fa-x-twitter"></i> X
            </a>
            <a href="https://discord.com/invite/gjWXPvheK6" class="link-item" target="_blank">
                <i class="fab fa-discord"></i> Discord
            </a>
            <a href="https://open.spotify.com/user/31cxs2lhxuzyt4x4czp6n524vajy?si=b834c2c8374c4eea" class="link-item" target="_blank">
                <i class="fab fa-spotify"></i> Spotify
            </a>
        </div>

        <footer>© 2026 MiloTW of Pulse Studio. All Rights Reserved.</footer>
    </div>

    <script>
        function toggleSensi() {
            const tag = document.getElementById('valTag');
            if (tag.innerText === 'VALORANT') {
                tag.innerText = '800 * 0.472';
                tag.classList.add('active');
            } else {
                tag.innerText = 'VALORANT';
                tag.classList.remove('active');
            }
        }
    </script>

</body>
</html>
