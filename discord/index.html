<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.hsuddfps.com/uploads/1485558262266069023_MiloPFP_M.jpg" type="image/jpeg">
    <title>MiloTW 米鹿丨Discord Sever</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* 背景處理 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://cdn.pulse-studio.live/uploads/efac14b9-a514-4b20-9b0f-80786fb1b21a.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .main-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 40px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-link:hover {
            transform: scale(1.1);
        }

        /* 文字樣式 */
        .side-text {
            color: white;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.3);
            opacity: 0.9;
            user-select: none;
        }

        .icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #5865F2;
            border-bottom-color: #5865F2;
            animation: spin 2s linear infinite;
        }

        .loader-ring::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-left-color: rgba(255, 255, 255, 0.5);
            border-right-color: rgba(255, 255, 255, 0.5);
            animation: spin 4s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .discord-icon {
            width: 60px;
            height: 60px;
            fill: white;
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(88, 101, 242, 0.9));
        }

        @media (max-width: 480px) {
            .main-link { gap: 20px; }
            .side-text { font-size: 20px; letter-spacing: 3px; }
            .icon-wrapper { width: 90px; height: 90px; }
            .discord-icon { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <a href="https://discord.gg/p8YVXuAZCd" class="main-link">
        <span class="side-text">點擊</span>
        
        <div class="icon-wrapper">
            <div class="loader-ring"></div>
            <svg class="discord-icon" viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.39,80.21a105.73,105.73,0,0,0,32.17,16.15,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.52-51.11-19.73-72.13ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
        </div>

        <span class="side-text">加入</span>
    </a>

</body>
</html>
